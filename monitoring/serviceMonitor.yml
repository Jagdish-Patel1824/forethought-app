apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: node-app-monitor
  namespace: monitoring
  labels:
    release: monitoring

spec:
  selector:
    matchLabels:
      app: node-app

  namespaceSelector:
    matchNames:
      - default

  endpoints:
    - port: metrics
      path: /metrics
      interval: 5s